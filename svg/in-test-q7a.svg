<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Прямая на координатной плоскости через точки (0;-1) и (1;1)">
  <rect width="300" height="300" fill="#ffffff"/>
  <defs>
    <pattern id="g7a" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#eeeeee" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="300" height="300" fill="url(#g7a)"/>
  <!-- axes -->
  <line x1="10" y1="150" x2="290" y2="150" stroke="#888888" stroke-width="1.5"/>
  <line x1="150" y1="290" x2="150" y2="10" stroke="#888888" stroke-width="1.5"/>
  <polygon points="292,150 282,145 282,155" fill="#888888"/>
  <polygon points="150,8 145,18 155,18" fill="#888888"/>
  <text x="276" y="168" font-family="sans-serif" font-size="13" fill="#888888">x</text>
  <text x="158" y="22" font-family="sans-serif" font-size="13" fill="#888888">y</text>
  <!-- line y = 2x - 1 -->
  <line x1="105" y1="270" x2="225" y2="30" stroke="#4f46e5" stroke-width="3"/>
  <!-- marked points -->
  <circle cx="150" cy="180" r="4.5" fill="#e11d48"/>
  <circle cx="180" cy="120" r="4.5" fill="#e11d48"/>
  <text x="156" y="198" font-family="sans-serif" font-size="13" fill="#e11d48">(0; −1)</text>
  <text x="186" y="114" font-family="sans-serif" font-size="13" fill="#e11d48">(1; 1)</text>
</svg>
