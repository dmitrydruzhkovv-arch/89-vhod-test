<svg viewBox="0 0 392 272" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Два круга на клетчатой бумаге — во сколько раз площадь большего больше">
  <rect width="392" height="272" fill="#ffffff"/>
  <defs>
    <pattern id="gridC" width="30" height="30" patternUnits="userSpaceOnUse" x="16" y="16">
      <path d="M30 0H0V30" fill="none" stroke="#c4c4c4" stroke-width="1"/>
    </pattern>
  </defs>
  <rect x="16" y="16" width="360" height="240" fill="url(#gridC)"/>
  <rect x="16" y="16" width="360" height="240" fill="none" stroke="#d6d6d6" stroke-width="1"/>
  <!-- big circle: center (4,4), radius = √10 cells (проходит через узлы 1↔3) -->
  <circle cx="136" cy="136" r="94.87" fill="#4f46e5" fill-opacity="0.06" stroke="#4f46e5" stroke-width="3"/>
  <circle cx="136" cy="136" r="3" fill="#e11d48"/>
  <!-- small circle: center (10,4), radius = 2 cells -->
  <circle cx="316" cy="136" r="60" fill="#4f46e5" fill-opacity="0.06" stroke="#4f46e5" stroke-width="3"/>
  <circle cx="316" cy="136" r="3" fill="#e11d48"/>
</svg>
