<svg viewBox="0 0 560 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Четыре графика на выбор: A, B, C, D">
  <rect width="560" height="160" fill="#ffffff"/>
  <!-- mini axes for 4 panels -->
  <g stroke="#dddddd" stroke-width="1">
    <line x1="12" y1="80" x2="128" y2="80"/><line x1="70" y1="22" x2="70" y2="138"/>
    <line x1="152" y1="80" x2="268" y2="80"/><line x1="210" y1="22" x2="210" y2="138"/>
    <line x1="292" y1="80" x2="408" y2="80"/><line x1="350" y1="22" x2="350" y2="138"/>
    <line x1="432" y1="80" x2="548" y2="80"/><line x1="490" y1="22" x2="490" y2="138"/>
  </g>
  <!-- figures -->
  <g stroke="#4f46e5" stroke-width="3" fill="none" stroke-linecap="round">
    <line x1="45" y1="34" x2="95" y2="98"/>           <!-- A: вниз, +сдвиг (верный) -->
    <line x1="185" y1="98" x2="235" y2="34"/>          <!-- B: вверх, +сдвиг -->
    <path d="M320 44 Q350 108 380 44"/>               <!-- C: парабола -->
    <line x1="465" y1="62" x2="515" y2="126"/>         <!-- D: вниз, −сдвиг -->
  </g>
  <!-- labels -->
  <g font-family="sans-serif" font-size="15" font-weight="bold" fill="#111111">
    <text x="18" y="28">A</text><text x="158" y="28">B</text><text x="298" y="28">C</text><text x="438" y="28">D</text>
  </g>
</svg>
